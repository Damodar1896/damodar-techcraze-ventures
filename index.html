<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damodar Techcraze Ventures</title>
    <!-- Premium Google Fonts Lineup -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Syne:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Ultra Luxury Matte Black Canvas */
        body {
            background-color: #0D0F12;
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-hidden: hidden;
        }

        /* High Luxury Typography Center Block */
        .brand-container {
            padding: 20px;
        }

        .brand-title {
            font-size: 54px;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 768px) {
            .brand-title {
                font-size: 38px;
            }
        }
    </style>
</head>
<body>

    <div class="brand-container">
        <h1 class="brand-title">Damodar Techcraze Ventures</h1>
    </div>

</body>
</html>
