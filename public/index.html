<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Damodar Techcraze Ventures | Sovereign Institutional Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #02040a; --glass: rgba(10, 20, 42, 0.85); --cyan: #00f3ff; --rose: #ff2a5f; --muted: #8e98a8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        /* Master Layout Frame */
        .page-container { width: 90%; max-width: 1400px; margin: 0 auto; position: relative; }
        
        /* Professional Nav */
        header { padding: 40px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: 5px; text-transform: uppercase; background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 30px; font-family: 'Space Grotesk'; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        
        /* Hero Section */
        .hero { text-align: center; margin: 150px 0; }
        .hero-title { font-size: 80px; font-weight: 900; letter-spacing: -3px; line-height: 1; margin-bottom: 30px; }
        
        /* 125 Assets Grid - Scalable */
        .grid-matrix { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 80px; }
        .card-luxury { background: var(--panel-glass); border: 1px solid rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; transition: 0.3s; }
        .card-luxury:hover { border-color: var(--cyan); transform: translateY(-10px); }
        .card-price { font-size: 28px; font-weight: 700; font-family: 'Space Grotesk'; margin: 20px 0; }
        
        /* Marquee Reviews Engine */
        .marquee-section { width: 100vw; overflow: hidden; padding: 80px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .marquee-track { display: flex; animation: scroll 40s linear infinite; }
        .review-node { width: 400px; background: #060b16; padding: 30px; border-radius: 15px; margin-right: 30px; flex-shrink: 0; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Scarcity Countdown */
        .scarcity-block { padding: 60px; background: #0a1122; border-radius: 25px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="page-container">
        <header>
            <div class="logo">Damodar Techcraze Ventures</div>
            <div class="nav-links">PROTOCOL ENGINE // ONLINE</div>
        </header>

        <section class="hero">
            <h1 class="hero-title">Command Control of Global Distribution Capital</h1>
            <p>Sovereign-grade asset variation matrix engineered for elite institutional exploration.</p>
        </section>

        <div class="grid-matrix" id="assets-grid"></div>

        <section class="marquee-section">
            <h2 style="text-align:center; margin-bottom:50px;">Verified Network Evaluations</h2>
            <div class="marquee-track" id="reviews-track"></div>
        </section>

        <section class="scarcity-block">
            <div><h3>94.2% Regional Allocation Reached</h3></div>
            <div id="timer" style="font-size:40px; font-family:monospace; color:var(--rose);">15:00</div>
        </section>
    </div>

    <script>
        // Data Injection Engine
        const assets = Array.from({length: 125}, (_, i) => ({
            id: i + 1, title: `Asset Matrix ${i+1}`, price: `$${(Math.random()*10000).toFixed(0)}`
        }));

        function renderAssets() {
            const grid = document.getElementById('assets-grid');
            assets.slice(0, 9).forEach(item => {
                grid.innerHTML += `
                    <div class="card-luxury">
                        <h4>Unit ${item.id}</h4>
                        <h3 class="card-title">${item.title}</h3>
                        <div class="card-price">${item.price}</div>
                        <button style="padding:10px 20px;">Request Key</button>
                    </div>`;
            });
        }

        function renderReviews() {
            const track = document.getElementById('reviews-track');
            for(let i=0; i<10; i++) {
                track.innerHTML += `<div class="review-node">★★★★★<p>Damodar Techcraze Ventures scales our pipelines flawlessly.</p></div>`;
            }
        }

        renderAssets();
        renderReviews();
        setInterval(() => { /* Timer Logic */ }, 1000);
    </script>
</body>
</html>
