        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }

        /* Multilayer Volumetric Ambient Lighting */
        .ambient-glow-node { position: absolute; width: 1400px; height: 900px; background: radial-gradient(circle, rgba(0, 255, 204, 0.06) 0%, transparent 70%); filter: blur(140px); pointer-events: none; z-index: 0; }
